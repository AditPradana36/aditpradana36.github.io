<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mohammad Raditia Pradana</title>
<meta name="description" content="Mohammad Raditia Pradana — Researcher, Department of Geography, Universitas Indonesia. Urban analytics, street-view imagery, and geospatial computing." />
<link rel="icon" href="assets/img/icon.png" />
<link rel="stylesheet" href="assets/css/style.css" />
<!-- Prevents a flash of the wrong theme on load -->
<script>
  (function () {
    var saved = localStorage.getItem('portfolio-theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-left">
    <a class="nav-name" id="nav-name" href="#about"></a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#publications">Publications</a></li>
      <li><a href="#news">News</a></li>
    </ul>
  </div>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
    <svg class="icon-sun" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <span id="toggle-label">dark</span>
  </button>
</nav>

<!-- ── PAGE ─────────────────────────────────────────────────────────── -->
<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img id="sidebar-photo" class="sidebar-photo" src="" alt="" />
    <p id="sidebar-name" class="sidebar-name"></p>
    <p id="sidebar-role" class="sidebar-role"></p>
    <div id="sidebar-links" class="sidebar-links"></div>
  </aside>

  <!-- MAIN -->
  <main>

    <section id="about">
      <p class="sec-label">About</p>
      <p id="about-text" class="about-text"></p>
    </section>

    <section id="education">
      <p class="sec-label">Education</p>
      <div id="education-list"></div>
    </section>

    <section id="experience">
      <p class="sec-label">Experience</p>
      <div id="experience-list"></div>
    </section>

    <section id="projects">
      <p class="sec-label">Projects</p>
      <div id="projects-grid" class="projects-grid"></div>
    </section>

    <section id="publications">
      <p class="sec-label">Publications</p>
      <div id="publications-list"></div>
    </section>

    <section id="news">
      <p class="sec-label">News</p>
      <div id="news-list"></div>
    </section>

  </main>
</div>

<footer></footer>

<script src="assets/js/main.js"></script>
</body>
</html>
