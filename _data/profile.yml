short_bio: >-
  <p>
    I spend most of my time staring at street-view images, trying to figure out what they can tell us about
    cities. I work as a researcher at <a href="https://frontiers.ui.ac.id/sparc/" target="_blank">SPARC</a>, Department of Geography, Universitas Indonesia, somewhere between
    computer vision and old-fashioned urban geography, with a soft spot for greenery, sustainability, and the
    small visual details that make a street feel like a place.
  </p>
  <p>
    I studied Geography at Universitas Indonesia for both my B.Sc. and M.Sc., focusing on urban context
    research.
    I've had the chance to teach a bit, mentor some undergraduate students, and write papers on things
    like green space equity and street-view methods. Most days I'm still learning as I go, which I think is
    the fun part.
  </p>

